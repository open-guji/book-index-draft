name: Notify kaiyuanguji-web

on:
  push:
    branches: [main]
    paths:
      - 'Work/**'
      - 'Book/**'
      - 'Collection/**'
      - 'index/**'
      - 'index.json'
      - 'resource.json'
      - 'resource-site.json'
      - 'recommended.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: open-guji/kaiyuanguji-web
          event-type: data-updated
